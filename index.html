<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F4EF;--surface:#FFFFFF;--surface2:#F2EDE6;--border:#E5DDD0;--border2:#C9BFB0;
  --text:#1C1917;--text2:#6B6560;--text3:#A8A29E;
  --amber:#D97706;--amber-bg:#FFFBEB;--amber-light:#FDE68A;--amber-dark:#92400E;
  --teal:#0D9488;--teal-bg:#F0FDFA;--teal-light:#99F6E4;--teal-dark:#134E4A;
  --green:#16A34A;--green-bg:#F0FDF4;--green-light:#86EFAC;
  --red:#DC2626;--red-bg:#FEF2F2;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --shadow:0 1px 4px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
  --radius:12px;--radius-sm:8px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
textarea,input{font-family:inherit}

/* HEADER */
.header{position:sticky;top:0;z-index:300;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow)}
.brand{display:flex;align-items:center;gap:8px}
.brand-icon{width:32px;height:32px;background:var(--amber);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.brand-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text)}
.header-center{display:flex;align-items:center;gap:6px}
.week-nav{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.wnav-btn{background:none;border:none;padding:6px 11px;font-size:15px;color:var(--text2);transition:background .15s}
.wnav-btn:hover:not(:disabled){background:var(--border)}
.wnav-btn:disabled{opacity:.3;cursor:default}
.wnav-label{padding:6px 14px;font-size:12px;font-weight:600;color:var(--text);border-left:1px solid var(--border);border-right:1px solid var(--border);min-width:168px;text-align:center}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;transition:all .15s}
.btn:hover{background:var(--surface2);border-color:var(--border2)}
.btn-amber{background:var(--amber);color:#fff;border-color:var(--amber)}
.btn-amber:hover{background:var(--amber-dark);border-color:var(--amber-dark)}
.header-right{display:flex;align-items:center;gap:8px}
.header-stats{display:flex;gap:12px}
.hstat{text-align:right}
.hstat-val{font-size:15px;font-weight:600;color:var(--amber);line-height:1}
.hstat-lab{font-size:10px;color:var(--text3);margin-top:1px}

/* LAYOUT */
.layout{display:flex}

/* SIDEBAR */
.sidebar{width:272px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 14px;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;display:flex;flex-direction:column;gap:18px}
.sb-title{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:10px}

/* Mini calendar */
.mcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.mcal-month{font-size:13px;font-weight:600}
.mcal-nbtn{background:none;border:none;color:var(--text2);font-size:14px;padding:2px 7px;border-radius:4px;transition:background .1s}
.mcal-nbtn:hover{background:var(--surface2)}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mcal-dow{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:3px 0}
.mcal-cell{position:relative;text-align:center;font-size:11px;padding:3px 1px;border-radius:4px;cursor:pointer;color:var(--text2);transition:background .1s;line-height:1.4}
.mcal-cell:hover:not(.empty):not(.out){background:var(--surface2)}
.mcal-cell.out{opacity:.2;cursor:default;pointer-events:none}
.mcal-cell.empty{cursor:default}
.mcal-cell.in-week{background:#FEF3C7;color:var(--amber-dark);font-weight:500;border-radius:2px}
.mcal-cell.today-cell{background:var(--amber)!important;color:#fff!important;font-weight:700;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:auto}
.mcal-cell.full-done::after{content:'';position:absolute;bottom:1px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--green)}
.mcal-cell.wend{color:var(--amber)}

/* Progress */
.prog{margin-bottom:10px}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-lab{font-size:12px;color:var(--text2)}
.prog-val{font-size:12px;font-weight:600}
.prog-track{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.prog-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.fill-amber{background:linear-gradient(90deg,var(--amber),#F59E0B)}
.fill-teal{background:linear-gradient(90deg,var(--teal),#14B8A6)}

/* Streak */
.streak-box{background:linear-gradient(135deg,#FFFBEB,#FFF7ED);border:1px solid var(--amber-light);border-radius:var(--radius-sm);padding:12px;text-align:center}
.streak-num{font-family:'Playfair Display',serif;font-size:38px;color:var(--amber);line-height:1}
.streak-sub{font-size:11px;color:var(--amber-dark);margin-top:3px;font-weight:500}

/* Check rows */
.chk-row{display:flex;align-items:center;justify-content:space-between;padding:3px 0}
.chk-name{font-size:12px;color:var(--text2)}
.chk-dots{display:flex;gap:4px}
.chk-dot{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2)}
.chk-dot.s{background:var(--amber);border-color:var(--amber)}
.chk-dot.c{background:var(--teal);border-color:var(--teal)}

/* Pending sidebar list */
.pend-item{padding:7px 0;border-bottom:1px solid var(--border)}
.pend-item:last-child{border:none}
.pend-date{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.pend-text{font-size:12px;color:var(--text2);white-space:pre-wrap}

/* Email panel */
.email-panel{background:var(--blue-bg);border:1px solid #BFDBFE;border-radius:var(--radius-sm);padding:12px}
.email-panel label{font-size:11px;font-weight:600;color:var(--blue);display:block;margin-bottom:6px}
.email-panel input{width:100%;padding:7px 10px;border:1px solid #BFDBFE;border-radius:6px;background:var(--surface);font-size:12px;color:var(--text);outline:none;margin-bottom:6px}
.email-panel input:focus{border-color:var(--blue)}
.email-msg{font-size:11px;text-align:center;margin-top:5px;font-weight:500}

/* MAIN FEED */
.feed{flex:1;padding:20px 22px;display:flex;flex-direction:column;gap:14px;min-width:0}

/* Summary bar */
.week-summary{background:linear-gradient(135deg,var(--amber-bg),#FFF7ED);border:1px solid var(--amber-light);border-radius:var(--radius);padding:14px 18px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ws-stat{text-align:center}
.ws-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--amber);line-height:1}
.ws-lab{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.ws-div{width:1px;height:36px;background:var(--amber-light)}
.ws-msg{font-size:13px;color:var(--amber-dark);font-weight:500;flex:1;min-width:200px}

/* Day card */
.day-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .2s,transform .1s}
.day-card:hover{box-shadow:var(--shadow-md)}
.day-card.today{border:2px solid var(--amber)}
.day-card.past{opacity:.72}

.card-head{padding:13px 18px;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-bottom:1px solid var(--border)}
.card-head.wknd{background:#FFFBEB}
.card-head.today{background:#FFFBEB}
.card-date-wrap{}
.card-date{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.4px}
.badge-today{background:var(--amber);color:#fff}
.badge-wknd{background:var(--amber-light);color:var(--amber-dark)}
.badge-done{background:var(--green-bg);color:var(--green)}

/* Goal buttons */
.card-goals{padding:11px 18px;display:flex;gap:8px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.goal-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);border:1.5px dashed var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;font-weight:500;transition:all .2s;user-select:none}
.goal-btn:active{transform:scale(.97)}
.goal-btn.sdone{background:var(--amber-bg);border:1.5px solid var(--amber);color:var(--amber-dark)}
.goal-btn.cdone{background:var(--teal-bg);border:1.5px solid var(--teal);color:var(--teal-dark)}
.gcheck{width:16px;height:16px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;font-weight:700}
.sdone .gcheck,.cdone .gcheck{background:currentColor;color:#fff}

/* Card body */
.card-body{display:grid;grid-template-columns:1fr 1fr}
.cs{padding:13px 18px}
.cs.border-left{border-left:1px solid var(--border)}
.cs.full{grid-column:1/-1;border-top:1px solid var(--border);background:linear-gradient(135deg,#F0FDF4,#ECFDF5)}
.cs-label{font-size:10px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:4px}
.cs-label.green{color:var(--green)}
textarea{width:100%;background:transparent;border:none;resize:none;outline:none;font-size:13px;color:var(--text);line-height:1.65;min-height:68px}
textarea::placeholder{color:var(--text3)}

/* Carried-over banner */
.carried{background:#FFF7ED;border:1px solid #FED7AA;border-radius:6px;padding:8px 10px;margin-bottom:7px;font-size:12px;color:var(--amber-dark)}
.carried-lbl{font-size:10px;font-weight:700;color:var(--amber);margin-bottom:3px;letter-spacing:.5px;text-transform:uppercase}
.carried-text{white-space:pre-wrap;color:var(--amber-dark)}

/* Toast */
#toast{position:fixed;bottom:22px;right:22px;background:#1C1917;color:#fff;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;box-shadow:var(--shadow-md);z-index:9999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  .sidebar{display:none}
  .header-stats{display:none}
}
@media(max-width:600px){
  .card-body{grid-template-columns:1fr}
  .cs.border-left{border-left:none;border-top:1px solid var(--border)}
  .header-center{display:none}
}
</style>
</head>
<body>
<div id="toast"></div>

<div class="header">
  <div class="brand">
    <div class="brand-icon">📖</div>
    <span class="brand-title">Study Tracker</span>
  </div>
  <div class="header-center">
    <button class="btn" onclick="jumpToday()">Today</button>
    <div class="week-nav">
      <button class="wnav-btn" id="prevBtn" onclick="prevWeek()">‹</button>
      <div class="wnav-label" id="weekLabel">—</div>
      <button class="wnav-btn" id="nextBtn" onclick="nextWeek()">›</button>
    </div>
  </div>
  <div class="header-right">
    <div class="header-stats" id="hstats"></div>
    <button class="btn btn-amber" onclick="toggleEmail()">✉ Remind me</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="feed" id="feed"></div>
</div>

<script>
const START = new Date(2026, 3, 20);
const END   = new Date(2026, 7, 20);
const SK    = 'study_tracker_2026_v3';
let DATA     = {};
let weekIdx  = 0;
let calMonth = new Date(2026, 3, 1);
let emailOpen = false;
let emailAddr = 'jyothisree.movva@gmail.com';

const QUOTES = [
  { q: "Hard work is not a guarantee — but it is the only path. Choose it every single day.", a: "Study Tracker" },
  { q: "Your destiny is not handed to you. It is built — decision by decision, hour by hour.", a: "Study Tracker" },
  { q: "The harder you work, the luckier you get.", a: "Gary Player" },
  { q: "You don't rise to the level of your goals. You fall to the level of your systems.", a: "James Clear" },
  { q: "Nobody who gave their best ever regretted it.", a: "George Halas" },
  { q: "Decide what you want. Decide what you are willing to exchange for it. Get to work.", a: "H.L. Hunt" },
  { q: "The future belongs to those who prepare for it today.", a: "Malcolm X" },
  { q: "Opportunities don't happen. You create them.", a: "Chris Grosser" },
  { q: "There are no shortcuts to any place worth going.", a: "Beverly Sills" },
  { q: "The only way to do great work is to love what you do — and then outwork everyone else.", a: "Steve Jobs" },
  { q: "Success is the sum of small efforts repeated day in and day out.", a: "Robert Collier" },
  { q: "You are the author of your own story. Make it one worth reading.", a: "Study Tracker" },
  { q: "Don't wish it were easier. Wish you were better.", a: "Jim Rohn" },
  { q: "Your future is created by what you do today, not tomorrow.", a: "Robert Kiyosaki" },
  { q: "It always seems impossible until it is done.", a: "Nelson Mandela" },
  { q: "The distance between who you are and who you want to be is called discipline.", a: "Study Tracker" },
  { q: "Push yourself, because no one else is going to do it for you.", a: "Study Tracker" },
  { q: "Every expert was once a beginner who refused to quit.", a: "Study Tracker" },
  { q: "Talent is cheaper than table salt. What separates the talented from the successful is hard work.", a: "Stephen King" },
  { q: "You control your effort. Make that the one thing you never compromise on.", a: "Study Tracker" },
];

// Short versions for tight spaces (Sunday card header)
const SHORT_QUOTES = [
  { q: "Decide your destiny.", a: "Study Tracker" },
  { q: "Hard work always pays off.", a: "Study Tracker" },
  { q: "Your effort writes your future.", a: "Study Tracker" },
  { q: "No shortcuts to greatness.", a: "Beverly Sills" },
  { q: "Outwork everyone around you.", a: "Study Tracker" },
  { q: "Small steps, massive results.", a: "Study Tracker" },
  { q: "Discipline is destiny.", a: "Ryan Holiday" },
  { q: "Today's grind, tomorrow's glory.", a: "Study Tracker" },
  { q: "Refuse to be ordinary.", a: "Study Tracker" },
  { q: "Your potential has no ceiling.", a: "Study Tracker" },
];

/* ── Helpers ── */
function fmtKey(d){ return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function p2(n){ return String(n).padStart(2,'0'); }
function isWend(d){ return d.getDay()===0||d.getDay()===6; }
function isSun(d){ return d.getDay()===0; }
function goals(d){ return {study:isWend(d)?4:2}; }
function fmtLong(d){ return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}); }
function fmtShort(d){ return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function fmtMonYear(d){ return d.toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function fmtMon(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

const TODAY_KEY = fmtKey(START);

/* ── Generate & group ── */
function genDays(){
  const out=[]; const d=new Date(START);
  while(d<=END){ out.push(new Date(d)); d.setDate(d.getDate()+1); }
  return out;
}
function groupWeeks(days){
  const wm={};
  days.forEach(d=>{
    const dow=d.getDay();
    const mon=new Date(d);
    mon.setDate(d.getDate()-(dow===0?6:dow-1));
    const k=fmtKey(mon);
    if(!wm[k]) wm[k]={mon,days:[]};
    wm[k].days.push(d);
  });
  return Object.values(wm).sort((a,b)=>a.mon-b.mon);
}
const ALL_DAYS = genDays();
const WEEKS    = groupWeeks(ALL_DAYS);

/* ── Storage ── */
function load(){
  try{ const s=localStorage.getItem(SK); if(s) DATA=JSON.parse(s); }catch(e){}
  weekIdx=WEEKS.findIndex(w=>w.days.some(d=>fmtKey(d)===TODAY_KEY));
  if(weekIdx<0) weekIdx=0;
  renderAll();
}
function save(){ try{localStorage.setItem(SK,JSON.stringify(DATA));}catch(e){} }

function set(key,patch){
  DATA[key]=Object.assign({},DATA[key]||{},patch);
  save();
  renderAll();
}

/* ── Streak ── */
function calcStreak(){
  let streak=0;
  const keys=ALL_DAYS.map(fmtKey);
  const todayIdx=keys.indexOf(TODAY_KEY);
  for(let i=todayIdx;i>=0;i--){
    const dd=DATA[keys[i]]||{};
    if(dd.studyDone) streak++;
    else break;
  }
  return streak;
}

/* ── Week stats ── */
function weekStats(week){
  let sD=0,sG=0; const topics=[];
  week.days.forEach(d=>{
    const k=fmtKey(d), g=goals(d), dd=DATA[k]||{};
    sG+=g.study;
    if(dd.studyDone) sD+=g.study;
    if(dd.studyLog&&dd.studyLog.trim()) topics.push({d,t:dd.studyLog});
  });
  return {sD,sG,topics};
}
function pct(a,b){ return b>0?Math.min(100,Math.round(a/b*100)):0; }

/* ── Pending ── */
function allPending(){
  return ALL_DAYS.map(d=>{
    const k=fmtKey(d), dd=DATA[k]||{};
    if(dd.pending&&dd.pending.trim()) return {d,date:fmtLong(d),tasks:dd.pending};
    return null;
  }).filter(Boolean);
}

/* ── Motivational message ── */
function motivate(p){
  if(p===100) return '🎉 Perfect week! Keep going!';
  if(p>=80) return '🔥 Almost there — finish strong!';
  if(p>=50) return '💪 Solid progress — you\'re on track!';
  if(p>=20) return '⚡ Good start — keep building momentum!';
  return '✨ Your week is waiting — start now!';
}

/* ── Toast ── */
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ── Navigation ── */
function prevWeek(){ if(weekIdx>0){ weekIdx--; renderAll(); } }
function nextWeek(){ if(weekIdx<WEEKS.length-1){ weekIdx++; renderAll(); } }
function jumpToday(){ weekIdx=WEEKS.findIndex(w=>w.days.some(d=>fmtKey(d)===TODAY_KEY)); renderAll(); }
function jumpToWeekOf(d){
  const k=fmtKey(d);
  const idx=WEEKS.findIndex(w=>w.days.some(x=>fmtKey(x)===k));
  if(idx>=0){ weekIdx=idx; renderAll(); }
}

/* ── Email ── */
function toggleEmail(){ emailOpen=!emailOpen; renderAll(); }
function sendEmail(){
  const pend=allPending();
  if(!emailAddr.trim()){toast('Please enter your email address.');return;}
  if(!pend.length){toast('No pending tasks found!');return;}
  const body=pend.map(p=>`${p.date}:\n${p.tasks}`).join('\n\n');
  const subject=encodeURIComponent('Study Tracker — Pending Tasks Reminder');
  const bod=encodeURIComponent('Hi!\n\nHere are your pending study tasks:\n\n'+body+'\n\nStay consistent and keep going!\n\n— Study Tracker 2026');
  window.open('mailto:'+emailAddr+'?subject='+subject+'&body='+bod,'_blank');
  toast('Opening your email client...');
}

/* ── Mini calendar ── */
function renderMiniCal(){
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const first=new Date(y,m,1), lastDay=new Date(y,m+1,0).getDate();
  const startDow=first.getDay(); // 0=Sun
  const offset=startDow===0?6:startDow-1; // offset to Monday-start grid

  const week=WEEKS[weekIdx];
  const weekKeys=new Set((week?week.days:[]).map(fmtKey));

  let html=`<div class="mcal-header">
    <button class="mcal-nbtn" onclick="calMonth=new Date(${y},${m}-1,1);renderSidebar()">‹</button>
    <span class="mcal-month">${fmtMonYear(calMonth)}</span>
    <button class="mcal-nbtn" onclick="calMonth=new Date(${y},${m}+1,1);renderSidebar()">›</button>
  </div>
  <div class="mcal-grid">
    <div class="mcal-dow">M</div><div class="mcal-dow">T</div><div class="mcal-dow">W</div>
    <div class="mcal-dow">T</div><div class="mcal-dow">F</div>
    <div class="mcal-dow" style="color:#D97706">S</div>
    <div class="mcal-dow" style="color:#D97706">S</div>`;

  for(let i=0;i<offset;i++) html+=`<div class="mcal-cell empty"></div>`;
  for(let day=1;day<=lastDay;day++){
    const cd=new Date(y,m,day);
    const ck=fmtKey(cd);
    const inRange=cd>=START&&cd<=END;
    const isToday=ck===TODAY_KEY;
    const inWeek=weekKeys.has(ck);
    const dd=DATA[ck]||{}, g=goals(cd);
    const allDone=dd.studyDone;
    const dow=(cd.getDay()+6)%7; // 0=Mon,...6=Sun
    const isWe=dow>=5;
    let cls='mcal-cell';
    if(!inRange) cls+=' out';
    else{
      if(isToday) cls+=' today-cell';
      else if(inWeek) cls+=' in-week';
      if(allDone&&inRange) cls+=' full-done';
      if(isWe) cls+=' wend';
    }
    html+=`<div class="${cls}" onclick="jumpToWeekOf(new Date(${y},${m},${day}))">${day}</div>`;
  }
  html+='</div>';
  return html;
}

/* ── Sidebar ── */
function renderSidebar(){
  const week=WEEKS[weekIdx];
  const st=weekStats(week);
  const streak=calcStreak();
  const pend=allPending();

  let html='';

  // Mini calendar
  html+=`<div class="sidebar-section"><div class="sb-title">Calendar</div>${renderMiniCal()}</div>`;

  // Streak
  html+=`<div class="sidebar-section">
    <div class="streak-box">
      <div class="streak-num">${streak}</div>
      <div class="streak-sub">day streak 🔥</div>
    </div>
  </div>`;

  // Weekly progress
  html+=`<div class="sidebar-section">
    <div class="sb-title">This week</div>
    <div class="prog">
      <div class="prog-row"><span class="prog-lab">Study</span><span class="prog-val" style="color:var(--amber)">${st.sD}h / ${st.sG}h</span></div>
      <div class="prog-track"><div class="prog-fill fill-amber" style="width:${pct(st.sD,st.sG)}%"></div></div>
    </div>
  </div>`;

  // Day checklist
  html+=`<div class="sidebar-section"><div class="sb-title">Daily status</div>`;
  week.days.forEach(d=>{
    const k=fmtKey(d), dd=DATA[k]||{};
    html+=`<div class="chk-row">
      <span class="chk-name">${d.toLocaleDateString('en-US',{weekday:'short',day:'numeric'})}</span>
      <div class="chk-dots">
        <div class="chk-dot ${dd.studyDone?'s':''}" title="Study"></div>
      </div>
    </div>`;
  });
  html+='</div>';

  // Pending tasks
  if(pend.length){
    html+=`<div class="sidebar-section">
      <div class="sb-title">Pending tasks <span style="background:#FEE2E2;color:#DC2626;padding:1px 7px;border-radius:10px;font-size:10px;margin-left:4px">${pend.length}</span></div>
      ${pend.map(p=>`<div class="pend-item">
        <div class="pend-date">${p.date}</div>
        <div class="pend-text">${escHtml(p.tasks.substring(0,80))}${p.tasks.length>80?'…':''}</div>
      </div>`).join('')}
    </div>`;
  }

  // Email reminder
  html+=`<div class="sidebar-section">
    <div class="sb-title">Email reminder</div>
    <div class="email-panel">
      <label>Send pending tasks to:</label>
      <input type="email" id="emailInp" value="${escHtml(emailAddr)}" placeholder="your@email.com" oninput="emailAddr=this.value">
      <button class="btn btn-amber" style="width:100%;justify-content:center" onclick="sendEmail()">Send via Gmail ✉</button>
    </div>
  </div>`;

  document.getElementById('sidebar').innerHTML=html;
}

/* ── Feed ── */
function renderFeed(){
  const week=WEEKS[weekIdx];
  const st=weekStats(week);
  const totalGoal=st.sG;
  const totalDone=st.sD;
  const p=pct(totalDone,totalGoal);
  const days=[...week.days]; // Mon → Sun order

  let html='';

  // Rotating motivational quote (changes each week)
  const q = QUOTES[weekIdx % QUOTES.length];
  html+=`<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;padding:14px 20px;display:flex;gap:12px;align-items:flex-start">
    <span style="font-size:22px;flex-shrink:0;line-height:1">💡</span>
    <div>
      <div style="font-size:14px;font-style:italic;color:#78350F;line-height:1.55;font-family:'Playfair Display',serif">"${q.q}"</div>
      <div style="font-size:11px;color:#D97706;margin-top:5px;font-weight:600;letter-spacing:.5px">— ${q.a}</div>
    </div>
  </div>`;

  // Monday weekly snapshot banner
  const isMonday = new Date().getDay()===1;
  const snapKey  = 'snap_sent_'+fmtKey(new Date());
  const snapSent = localStorage.getItem(snapKey);
  if(isMonday && !snapSent){
    const prevW=WEEKS[Math.max(0,weekIdx-1)];
    const ps=prevW?weekStats(prevW):{sD:0,sG:0};
    html+=`<div style="background:#EFF6FF;border:1.5px solid #93C5FD;border-radius:12px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
      <div>
        <div style="font-size:13px;font-weight:600;color:#1E40AF">📬 It's Monday — send your weekly snapshot!</div>
        <div style="font-size:12px;color:#3B82F6;margin-top:3px">Last week: ${ps.sD}h / ${ps.sG}h study · ${pct(ps.sD,ps.sG)}% complete</div>
      </div>
      <button class="btn btn-amber" onclick="sendWeeklySnapshot()" style="flex-shrink:0">Send snapshot ✉</button>
    </div>`;
  }

  // Week summary bar
  html+=`<div class="week-summary">
    <div class="ws-stat"><div class="ws-val">${st.sD}</div><div class="ws-lab">Study hrs</div></div>
    <div class="ws-div"></div>
    <div class="ws-stat"><div class="ws-val">${st.sG}</div><div class="ws-lab">Target hrs</div></div>
    <div class="ws-div"></div>
    <div class="ws-stat"><div class="ws-val">${p}%</div><div class="ws-lab">Complete</div></div>
    <div class="ws-msg">${motivate(p)}</div>
  </div>`;

  days.forEach(d=>{
    const k=fmtKey(d), dd=DATA[k]||{}, g=goals(d);
    const isToday=k===TODAY_KEY, isPast=d<START, wend=isWend(d), sun=isSun(d);
    const allDone=dd.studyDone;

    // Carried-over from prev day
    const prev=new Date(d); prev.setDate(d.getDate()-1);
    const prevDd=DATA[fmtKey(prev)]||{};
    const carried=prevDd.pending&&prevDd.pending.trim();

    let headCls='card-head'+(wend?' wknd':'')+(isToday?' today':'');
    let cardCls='day-card'+(isToday?' today':'')+(isPast?' past':'');

    html+=`<div class="${cardCls}" id="card-${k}">
      <div class="${headCls}">
        <div class="card-date-wrap">
          <div class="card-date">
            ${escHtml(fmtLong(d))}
            ${isToday?'<span class="badge badge-today">Today</span>':''}
            ${wend&&!isToday?'<span class="badge badge-wknd">Weekend</span>':''}
            ${allDone?'<span class="badge badge-done">✓ Done</span>':''}
          </div>
          <div class="card-sub">${g.study}h study${wend?' — extended weekend grind':''}</div>
        </div>
        ${sun?`<div style="font-size:11px;color:#D97706;font-style:italic;max-width:240px;text-align:right;line-height:1.5">"${SHORT_QUOTES[weekIdx%SHORT_QUOTES.length].q}"<br><span style="font-style:normal;font-weight:600;font-size:10px">— ${SHORT_QUOTES[weekIdx%SHORT_QUOTES.length].a}</span></div>`:''}
      </div>

      <div class="card-goals">
        <button class="goal-btn ${dd.studyDone?'sdone':''}" onclick="toggleGoal('${k}','studyDone')">
          <span class="gcheck">${dd.studyDone?'✓':''}</span>
          📚 Study ${g.study}h${dd.studyDone?' — Done!':''}
        </button>
      </div>

      <div class="card-body">
        <div class="cs">
          <div class="cs-label">📝 Notes for today</div>
          ${carried?`<div class="carried"><div class="carried-lbl">↩ Carried from ${fmtShort(prev)}</div><div class="carried-text">${escHtml(carried)}</div></div>`:''}
          <textarea rows="3" placeholder="Key takeaways, things you learnt, how the session went…" onchange="setField('${k}','notes',this.value)">${escHtml(dd.notes||'')}</textarea>
        </div>
        <div class="cs border-left">
          <div class="cs-label" style="color:#DC2626">⏳ Pending for tomorrow</div>
          <textarea rows="3" placeholder="Tasks to carry forward, topics to revisit…" onchange="setField('${k}','pending',this.value)">${escHtml(dd.pending||'')}</textarea>
        </div>
        ${sun?`
        <div class="cs full">
          <div class="cs-label green">🗂 Weekly log — What I covered this week</div>
          <div style="font-size:11px;color:#15803D;margin-bottom:8px;font-style:italic">One week closer to your goal. Document your wins and gaps honestly.</div>
          <textarea rows="4" placeholder="Topics covered · breakthroughs · what needs more depth · how many hours felt truly focused…" onchange="setField('${k}','studyLog',this.value)">${escHtml(dd.studyLog||'')}</textarea>
        </div>`:''}
      </div>
    </div>`;
  });

  document.getElementById('feed').innerHTML=html;
}

/* ── Header stats ── */
function renderHeaderStats(){
  const week=WEEKS[weekIdx];
  const st=weekStats(week);
  document.getElementById('hstats').innerHTML=`
    <div class="hstat"><div class="hstat-val">${st.sD}h</div><div class="hstat-lab">Study</div></div>
  `;
  const w=WEEKS[weekIdx];
  const s=w.days[0], e=w.days[w.days.length-1];
  document.getElementById('weekLabel').textContent=fmtMon(s)+' – '+fmtMon(e);
  document.getElementById('prevBtn').disabled=weekIdx===0;
  document.getElementById('nextBtn').disabled=weekIdx===WEEKS.length-1;
}

/* ── Actions ── */
function toggleGoal(key,field){
  const val=!(DATA[key]||{})[field];
  set(key,{[field]:val});
  if(val) toast('Study session marked done! 📚');
}
function setField(key,field,val){
  DATA[key]=Object.assign({},DATA[key]||{},{[field]:val});
  save();
  // re-render sidebar for pending count update (lightweight)
  renderSidebar();
}

/* ── Weekly snapshot ── */
function sendWeeklySnapshot(){
  const prevW=WEEKS[Math.max(0,weekIdx-1)];
  const ps=prevW?weekStats(prevW):{sD:0,sG:0,topics:[]};
  const pend=allPending();
  const topicsText=ps.topics.map(t=>`${fmtShort(t.d)}: ${t.t}`).join('\n');
  const pendText=pend.map(p=>`${p.date}: ${p.tasks}`).join('\n');
  const q=QUOTES[weekIdx%QUOTES.length];
  const body=`Hi Jyothisree!\n\nHere's your weekly study snapshot 📊\n\n`+
    `LAST WEEK (${prevW?fmtMon(prevW.days[0]):'—'} – ${prevW?fmtMon(prevW.days[prevW.days.length-1]):'—'})\n`+
    `─────────────────────────────\n`+
    `Study hours completed : ${ps.sD}h / ${ps.sG}h\n`+
    `Overall completion    : ${pct(ps.sD,ps.sG)}%\n\n`+
    (topicsText?`TOPICS COVERED\n─────────────────────────────\n${topicsText}\n\n`:'')+
    (pendText?`PENDING TASKS\n─────────────────────────────\n${pendText}\n\n`:'')+
    `This week's goal: ${WEEKS[weekIdx]?fmtMon(WEEKS[weekIdx].days[0]):'—'} – ${WEEKS[weekIdx]?fmtMon(WEEKS[weekIdx].days[WEEKS[weekIdx].days.length-1]):'—'}\n`+
    `Study target : ${ps.sG}h\n\n`+
    `─────────────────────────────\n`+
    `💡 "${q.q}" — ${q.a}\n\n`+
    `Keep grinding. You're one week closer to your goal.\n\n— Study Tracker 2026`;

  const subject=encodeURIComponent('Weekly Study Snapshot — '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}));
  const bod=encodeURIComponent(body);
  window.open('mailto:'+emailAddr+'?subject='+subject+'&body='+bod,'_blank');
  localStorage.setItem('snap_sent_'+fmtKey(new Date()),'1');
  toast('Weekly snapshot opened in Gmail! 📬');
  renderAll();
}

function renderAll(){
  renderHeaderStats();
  renderSidebar();
  renderFeed();
}

/* ── Boot ── */
load();
</script>
</body>
</html>
